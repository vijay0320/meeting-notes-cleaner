<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingMind — My Tasks</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --bg: #080808;
            --bg2: #0f0f0f;
            --bg3: #161616;
            --border: #1e1e1e;
            --text: #f0f0f0;
            --text2: #888;
            --text3: #444;
            --accent: #e8ff47;
            --accent2: #ff4757;
            --accent3: #47c8ff;
            --card: #111111
        }

        [data-theme="light"] {
            --bg: #f5f5f0;
            --bg2: #efefea;
            --bg3: #e8e8e3;
            --border: #ddddd8;
            --text: #0a0a0a;
            --text2: #555;
            --text3: #aaa;
            --accent: #1a1a1a;
            --accent2: #c0392b;
            --accent3: #0066cc;
            --card: #ffffff
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s, color 0.4s
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent3);
            display: inline-block;
            animation: pulse 2s ease-in-out infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8)
            }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .user-pill {
            font-size: 0.72rem;
            color: var(--text2);
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 100px
        }

        .btn {
            padding: 7px 16px;
            border-radius: 5px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            border: none;
            transition: all 0.15s
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2)
        }

        .btn-ghost:hover {
            border-color: var(--text3);
            color: var(--text)
        }

        .theme-toggle {
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: background 0.3s
        }

        .theme-toggle::after {
            content: '';
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text);
            transition: transform 0.3s
        }

        [data-theme="light"] .theme-toggle::after {
            transform: translateX(16px)
        }

        .content {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px
        }

        .page-header {
            margin-bottom: 32px;
            opacity: 0
        }

        .page-eyebrow {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 8px
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1
        }

        .page-title em {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--accent3)
        }

        /* Progress summary */
        .progress-summary {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            opacity: 0
        }

        .sum-stat {
            text-align: center
        }

        .sum-num {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px
        }

        .sum-label {
            font-size: 0.65rem;
            color: var(--text3);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px
        }

        .overall-bar {
            margin-top: 16px;
            grid-column: 1/-1
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            color: var(--text3);
            margin-bottom: 6px
        }

        .bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent3);
            transition: width 0.8s ease
        }

        /* Task items */
        .section-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 12px;
            margin-top: 24px
        }

        .task-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-left: 3px solid transparent;
            opacity: 0;
            transform: translateX(-10px)
        }

        .task-card.high {
            border-left-color: #ff4757
        }

        .task-card.medium {
            border-left-color: #47c8ff
        }

        .task-card.low {
            border-left-color: var(--accent)
        }

        .task-card.done {
            opacity: 0.4
        }

        .task-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px
        }

        .task-badge {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
            margin-top: 2px
        }

        .high .task-badge {
            background: #ff4757;
            color: #fff
        }

        .medium .task-badge {
            background: #47c8ff22;
            color: #47c8ff;
            border: 1px solid #47c8ff44
        }

        .low .task-badge {
            background: rgba(232, 255, 71, 0.1);
            color: var(--accent);
            border: 1px solid rgba(232, 255, 71, 0.2)
        }

        .task-text {
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.5;
            flex: 1
        }

        .task-meeting {
            font-size: 0.68rem;
            color: var(--text3);
            margin-bottom: 10px
        }

        .task-actions {
            display: flex;
            gap: 8px
        }

        .status-btn {
            padding: 5px 12px;
            border-radius: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text3);
            transition: all 0.15s
        }

        .status-btn:hover {
            border-color: var(--text2);
            color: var(--text)
        }

        .status-btn.active-todo {
            border-color: var(--text2);
            color: var(--text)
        }

        .status-btn.active-progress {
            border-color: #47c8ff;
            color: #47c8ff;
            background: rgba(71, 200, 255, 0.06)
        }

        .status-btn.active-done {
            border-color: #2ed573;
            color: #2ed573;
            background: rgba(46, 213, 115, 0.06)
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text3);
            font-size: 0.82rem
        }

        .cursor {
            width: 8px;
            height: 8px;
            background: var(--accent3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s;
            mix-blend-mode: difference
        }
    </style>
</head>

<body>
    <div class="cursor" id="cursor"></div>
    <nav>
        <div class="nav-logo"><span class="logo-dot"></span>MeetingMind</div>
        <div class="nav-right">
            <span class="user-pill" id="user-pill">Loading...</span>
            <button class="theme-toggle" onclick="toggleTheme()"></button>
            <button class="btn btn-ghost" onclick="logout()">Sign out</button>
        </div>
    </nav>

    <div class="content">
        <div class="page-header" id="page-header">
            <div class="page-eyebrow">Member Dashboard</div>
            <div class="page-title">Your <em>tasks</em></div>
        </div>

        <!-- Progress summary -->
        <div class="progress-summary" id="progress-summary">
            <div class="sum-stat">
                <div class="sum-num" style="color:#ff4757" id="sum-open">—</div>
                <div class="sum-label">Open</div>
            </div>
            <div class="sum-stat">
                <div class="sum-num" style="color:#47c8ff" id="sum-progress">—</div>
                <div class="sum-label">In Progress</div>
            </div>
            <div class="sum-stat">
                <div class="sum-num" style="color:#2ed573" id="sum-done">—</div>
                <div class="sum-label">Done</div>
            </div>
            <div class="overall-bar">
                <div class="bar-label"><span>Completion</span><span id="completion-pct">0%</span></div>
                <div class="bar">
                    <div class="bar-fill" id="completion-bar" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div id="tasks-container"></div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX - 4 + 'px'; cursor.style.top = e.clientY - 4 + 'px'; });

        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
        function toggleTheme() { const h = document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function logout() { fetch('/auth/logout', { method: 'POST', headers: authHeaders() }); localStorage.clear(); window.location.href = '/'; }

        async function loadMe() {
            const res = await fetch('/auth/me', { headers: authHeaders() });
            if (!res.ok) { window.location.href = '/login'; return; }
            const data = await res.json();
            document.getElementById('user-pill').textContent = data.name;
        }

        async function loadTasks() {
            const res = await fetch('/tasks', { headers: authHeaders() });
            const data = await res.json();
            const tasks = data.tasks || [];

            const open = tasks.filter(t => t.status === 'todo').length;
            const inprog = tasks.filter(t => t.status === 'in-progress').length;
            const done = tasks.filter(t => t.status === 'done').length;
            const total = tasks.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('sum-open').textContent = open;
            document.getElementById('sum-progress').textContent = inprog;
            document.getElementById('sum-done').textContent = done;
            document.getElementById('completion-pct').textContent = pct + '%';
            setTimeout(() => { document.getElementById('completion-bar').style.width = pct + '%'; }, 200);

            const container = document.getElementById('tasks-container');
            if (!tasks.length) { container.innerHTML = '<div class="empty">No tasks assigned yet.<br>Check back after your next meeting.</div>'; return; }

            const sections = [
                { label: 'High Priority', filter: t => t.priority === 'high' && t.status !== 'done' },
                { label: 'Medium Priority', filter: t => t.priority === 'medium' && t.status !== 'done' },
                { label: 'Low Priority', filter: t => t.priority === 'low' && t.status !== 'done' },
                { label: 'Completed', filter: t => t.status === 'done' },
            ];

            container.innerHTML = sections.map(s => {
                const items = tasks.filter(s.filter);
                if (!items.length) return '';
                return `
      <div class="section-label">${s.label}</div>
      ${items.map(t => `
        <div class="task-card ${t.priority} ${t.status === 'done' ? 'done' : ''}" id="task-${t.id}">
          <div class="task-top">
            <span class="task-badge">${t.priority.toUpperCase()}</span>
            <div class="task-text">${t.text}</div>
          </div>
          <div class="task-meeting">from: ${t.meeting_title}</div>
          <div class="task-actions">
            <button class="status-btn ${t.status === 'todo' ? 'active-todo' : ''}" onclick="updateStatus(${t.id},'todo')">○ Todo</button>
            <button class="status-btn ${t.status === 'in-progress' ? 'active-progress' : ''}" onclick="updateStatus(${t.id},'in-progress')">◑ In Progress</button>
            <button class="status-btn ${t.status === 'done' ? 'active-done' : ''}" onclick="updateStatus(${t.id},'done')">● Done</button>
          </div>
        </div>
      `).join('')}
    `;
            }).join('');

            anime({ targets: '.task-card', opacity: [0, 1], translateX: [-10, 0], delay: anime.stagger(60), duration: 400, easing: 'easeOutExpo' });
            anime({ targets: '#page-header', opacity: [0, 1], translateY: [-10, 0], duration: 600, easing: 'easeOutExpo' });
            anime({ targets: '#progress-summary', opacity: [0, 1], translateY: [10, 0], duration: 600, delay: 100, easing: 'easeOutExpo' });
        }

        async function updateStatus(itemId, status) {
            const res = await fetch('/items/' + itemId + '/status', {
                method: 'PUT', headers: authHeaders(),
                body: JSON.stringify({ status })
            });
            if (res.ok) loadTasks();
        }

        loadMe();
        loadTasks();
    </script>
</body>

</html>

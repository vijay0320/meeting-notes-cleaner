<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Notes Cleaner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; padding: 40px 20px; }
.container { max-width: 960px; margin: 0 auto; }
h1 { font-size: 2rem; font-weight: normal; letter-spacing: -0.5px; color: #fff; margin-bottom: 4px; }
.subtitle { color: #555; font-size: 0.82rem; font-family: monospace; margin-bottom: 32px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.tab { padding: 8px 20px; border-radius: 5px; font-family: monospace; font-size: 0.8rem; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: #666; letter-spacing: 0.5px; transition: all 0.15s; }
.tab.active { background: #e8e8e8; color: #0f0f0f; border-color: #e8e8e8; }
.panel { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
.page { display: none; } .page.active { display: block; }
label { display: block; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: #555; margin-bottom: 8px; font-family: monospace; }
input[type=text] { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #e8e8e8; font-family: monospace; font-size: 0.88rem; padding: 10px 14px; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
input[type=text]:focus { border-color: #444; }
textarea { width: 100%; height: 190px; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #e8e8e8; font-family: monospace; font-size: 0.88rem; line-height: 1.7; padding: 14px; resize: vertical; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: #444; }
.btn { background: #e8e8e8; color: #0f0f0f; border: none; padding: 11px 26px; border-radius: 6px; font-size: 0.82rem; font-weight: bold; cursor: pointer; transition: background 0.15s; margin-top: 14px; margin-right: 8px; }
.btn:hover { background: #fff; }
.btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
.btn-ghost { background: transparent; border: 1px solid #333; color: #888; }
.btn-ghost:hover { background: #222; color: #e8e8e8; }
.spinner { display: none; margin-top: 14px; font-family: monospace; font-size: 0.9rem; color: #c8ff00; font-weight: bold; animation: pulse 1.5s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.results-title { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: #555; font-family: monospace; }
.counts { font-family: monospace; font-size: 0.75rem; }
.counts span { margin-left: 10px; }
.item { display: flex; align-items: flex-start; gap: 10px; padding: 13px 15px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid transparent; }
.item.high   { background: #1f1410; border-left-color: #c0392b; }
.item.medium { background: #15180f; border-left-color: #8a9a2a; }
.item.low    { background: #111820; border-left-color: #2a6a8a; }
.item.done   { opacity: 0.4; }
.badge { font-size: 0.6rem; font-family: monospace; font-weight: bold; letter-spacing: 1px; padding: 3px 7px; border-radius: 3px; white-space: nowrap; margin-top: 3px; }
.high   .badge { background: #c0392b; color: #fff; }
.medium .badge { background: #6a7a1a; color: #fff; }
.low    .badge { background: #1a5a7a; color: #fff; }
.item-body { flex: 1; }
.item-text { font-size: 0.88rem; line-height: 1.5; color: #ddd; margin-bottom: 6px; }
.item-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.owner-tag { font-size: 0.7rem; font-family: monospace; color: #888; background: #222; padding: 2px 8px; border-radius: 3px; }
.owner-tag.assigned { color: #aaa; background: #1e2a1e; }
.status-select { font-size: 0.7rem; font-family: monospace; background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 3px; padding: 2px 6px; cursor: pointer; outline: none; }
.error { color: #c0392b; font-family: monospace; font-size: 0.82rem; margin-top: 12px; }
.meeting-card { padding: 14px 16px; border: 1px solid #2a2a2a; border-radius: 6px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
.meeting-card:hover { border-color: #444; }
.meeting-card-title { font-size: 0.9rem; color: #ddd; margin-bottom: 6px; }
.meeting-card-meta { font-size: 0.72rem; font-family: monospace; color: #555; }
.health-badge { display: inline-block; font-family: monospace; font-size: 0.72rem; padding: 2px 8px; border-radius: 3px; margin-top: 6px; }
.health-green  { background: #1a2e1a; color: #5a9a5a; }
.health-yellow { background: #2a2a1a; color: #9a9a2a; }
.health-red    { background: #2e1a1a; color: #c0392b; }
.health-none   { background: #1a1a1a; color: #444; }
.meeting-detail { display: none; }
.save-bar { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
.empty { color: #444; font-family: monospace; font-size: 0.85rem; padding: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>Meeting Notes Cleaner</h1>
  <p class="subtitle">owner detection &mdash; priority engine &mdash; action tracker &mdash; health score</p>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('clean')">Clean Notes</div>
    <div class="tab" onclick="switchTab('history')">History</div>
    <div class="tab" onclick="switchTab('workload')">Workload</div>
  </div>

  <div class="page active" id="page-clean">
    <div class="panel">
      <label>Meeting Title</label>
      <input type="text" id="title" placeholder="e.g. Sprint Planning — March 2">
      <label>Raw Notes</label>
      <textarea id="notes" placeholder="One item per line:&#10;&#10;troy - blocked on API spec, needs it asap&#10;deployment pipeline broke, critical blocker&#10;sara - design review thursday, needs sign off"></textarea>
      <div class="save-bar">
        <button class="btn" id="btn" onclick="processNotes()">Clean Notes &rarr;</button>
        <button class="btn btn-ghost" id="save-btn" style="display:none" onclick="saveMeeting()">Save to History</button>
        <button class="btn btn-ghost" id="record-btn" onclick="toggleRecording()">&#9679; Record</button>
        <button class="btn btn-ghost" id="export-md-btn" style="display:none" onclick="exportMarkdown()">&#8595; Export MD</button>
        <button class="btn btn-ghost" id="export-pdf-btn" style="display:none" onclick="exportPDF()">&#8595; Export PDF</button>
        <div id="record-status" style="font-family:monospace; font-size:0.75rem; color:#555; margin-top:8px; display:none"></div>
      </div>
      <div class="spinner" id="spinner">⚙️ Cleaning notes with flan-t5-base ML model... (10-30s on first run)</div>
      <div class="error" id="error"></div>
    </div>
    <div class="panel" id="results" style="display:none">
      <div class="results-header">
        <span class="results-title">Cleaned Output</span>
        <span class="counts" id="counts"></span>
      </div>
      <div id="output"></div>
    </div>
  </div>

  <div class="page" id="page-workload">
    <div class="panel">
      <div class="results-title" style="margin-bottom:16px">Owner Workload</div>
      <div id="workload-list"></div>
    </div>
  </div>

  <div class="page" id="page-history">
    <div class="panel">
      <div class="results-title" style="margin-bottom:16px">Saved Meetings</div>
      <div id="debt-banner"></div>
      <div id="meetings-list"></div>
    </div>
    <div class="panel meeting-detail" id="meeting-detail">
      <div class="results-header">
        <span class="results-title" id="detail-title"></span>
        <span class="counts" id="detail-meta"></span>
      </div>
      <div id="detail-items"></div>
    </div>
  </div>
</div>

<script>
let currentPoints = [];
let currentMeetingId = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['clean','history','workload'][i] === tab));
  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', ['clean','history','workload'][i] === tab));
  if (tab === 'history') loadHistory();
  if (tab === 'workload') loadWorkload();
}

function renderItems(points, container, meetingId) {
  container.innerHTML = points.map((p, i) => `
    <div class="item ${p.priority} ${p.status === 'done' ? 'done' : ''}" id="item-${meetingId}-${i}">
      <span class="badge">${p.priority.toUpperCase()}</span>
      <div class="item-body">
        <div class="item-text">${p.text}</div>
        <div class="item-meta">
          <span class="owner-tag ${p.owner !== 'Unassigned' ? 'assigned' : ''}">
            ${p.owner !== 'Unassigned' ? '👤 ' : ''}${p.owner}
          </span>
          <select class="status-select" onchange="updateStatus(${meetingId}, ${i}, this.value)">
            <option value="todo" ${p.status==='todo' ? 'selected' : ''}>○ Todo</option>
            <option value="in-progress" ${p.status==='in-progress' ? 'selected' : ''}>◑ In Progress</option>
            <option value="done" ${p.status==='done' ? 'selected' : ''}>● Done</option>
          </select>
        </div>
      </div>
    </div>
  `).join('');
}

function renderHealthBadge(health) {
  if (!health) return '<span class="health-badge health-none">◆ First meeting</span>';
  const cls = {green: 'health-green', yellow: 'health-yellow', red: 'health-red'}[health.color];
  return `<span class="health-badge ${cls}">◆ ${health.score}% ${health.label} &mdash; ${health.done}/${health.total} items closed</span>`;
}

async function processNotes() {
  const notes = document.getElementById('notes').value.trim();
  if (!notes) return;
  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spinner');
  const error = document.getElementById('error');
  btn.disabled = true;
  spinner.style.display = 'block';
  error.textContent = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('export-md-btn').style.display = 'none';
  document.getElementById('export-pdf-btn').style.display = 'none';
  try {
    const res = await fetch('/process', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({notes})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentPoints = data.points;
    currentMeetingId = null;
    const high = data.points.filter(p => p.priority === 'high').length;
    const med  = data.points.filter(p => p.priority === 'medium').length;
    const low  = data.points.filter(p => p.priority === 'low').length;
    document.getElementById('counts').innerHTML =
      `<span style="color:#c0392b">${high} high</span>` +
      `<span style="color:#8a9a2a">${med} medium</span>` +
      `<span style="color:#2a6a8a">${low} low</span>`;
    renderItems(data.points, document.getElementById('output'), 'new');
    document.getElementById('results').style.display = 'block';
    document.getElementById('save-btn').style.display = 'inline-block';
    document.getElementById('export-md-btn').style.display = 'inline-block';
    document.getElementById('export-pdf-btn').style.display = 'inline-block';
  } catch(e) {
    error.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

async function saveMeeting() {
  const title = document.getElementById('title').value.trim() || 'Untitled Meeting';
  const res = await fetch('/save', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title, points: currentPoints})
  });
  const data = await res.json();
  if (data.id) {
    currentMeetingId = data.id;
    document.getElementById('save-btn').textContent = '✓ Saved';
    document.getElementById('save-btn').disabled = true;
    renderItems(currentPoints, document.getElementById('output'), data.id);
  }
}

async function updateStatus(meetingId, itemIndex, status) {
  if (!meetingId || meetingId === 'new') return;
  await fetch('/update_status', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({meeting_id: meetingId, item_index: itemIndex, status})
  });
  const el = document.getElementById(`item-${meetingId}-${itemIndex}`);
  if (el) el.classList.toggle('done', status === 'done');
}

async function loadHistory() {
  const [meetingsRes, debtRes] = await Promise.all([fetch('/meetings'), fetch('/debt')]);
  const data = await meetingsRes.json();
  const debtData = await debtRes.json();
  const banner = document.getElementById('debt-banner');
  if (debtData.debt && debtData.debt.length > 0) {
    banner.innerHTML = debtData.debt.map(d => `
      <div style="background:#2e1a1a; border:1px solid #c0392b; border-radius:6px; padding:12px 16px; margin-bottom:10px;">
        <div style="font-family:monospace; font-size:0.72rem; color:#c0392b; letter-spacing:1px; margin-bottom:6px;">⚠ MEETING DEBT</div>
        <div style="font-size:0.88rem; color:#ddd;"><strong>${d.owner}</strong> has <strong>${d.open_high} unresolved HIGH items</strong> across ${d.meetings.length} meeting${d.meetings.length > 1 ? 's' : ''}</div>
        <div style="font-family:monospace; font-size:0.72rem; color:#888; margin-top:4px;">${d.meetings.join(' · ')}</div>
      </div>`).join('');
  } else { banner.innerHTML = ''; }
  const list = document.getElementById('meetings-list');
  if (!data.meetings.length) { list.innerHTML = '<div class="empty">No saved meetings yet.</div>'; return; }
  list.innerHTML = data.meetings.map(m => `
    <div class="meeting-card" onclick="loadMeeting(${m.id})">
      <div class="meeting-card-title">${m.title}</div>
      <div class="meeting-card-meta">${m.created_at} &mdash; ${m.item_count} items &nbsp;·&nbsp; <span style="color:#c0392b">${m.high_count} high</span> &nbsp;·&nbsp; <span style="color:#5a9a5a">${m.done_count} done</span></div>
      ${renderHealthBadge(m.health)}
    </div>`).join('');
  document.getElementById('meeting-detail').style.display = 'none';
}

async function loadMeeting(id) {
  const res = await fetch(`/meeting/${id}`);
  const data = await res.json();
  document.getElementById('detail-title').textContent = data.title;
  document.getElementById('detail-meta').innerHTML = renderHealthBadge(data.health);
  renderItems(data.items, document.getElementById('detail-items'), id);
  document.getElementById('meeting-detail').style.display = 'block';
}

async function loadWorkload() {
  const res = await fetch('/workload');
  const data = await res.json();
  const list = document.getElementById('workload-list');
  if (!data.workload || !data.workload.length) { list.innerHTML = '<div class="empty">No data yet.</div>'; return; }
  let html = `<div style="display:grid; grid-template-columns:1fr 60px 60px 60px 80px 100px; gap:8px; padding:8px 12px; font-family:monospace; font-size:0.7rem; color:#555; letter-spacing:1px; border-bottom:1px solid #2a2a2a; margin-bottom:8px;">
    <span>OWNER</span><span style="text-align:center">TOTAL</span><span style="text-align:center">OPEN</span><span style="text-align:center">DONE</span><span style="text-align:center">RATE</span><span style="text-align:center">STATUS</span></div>`;
  html += data.workload.map(o => {
    const barColor = o.completion >= 80 ? '#5a9a5a' : o.completion >= 50 ? '#9a9a2a' : '#c0392b';
    const status = o.overloaded ? '<span style="color:#c0392b; font-family:monospace; font-size:0.7rem;">⚠ OVERLOADED</span>'
      : o.completion === 100 ? '<span style="color:#5a9a5a; font-family:monospace; font-size:0.7rem;">✓ CLEAR</span>'
      : '<span style="color:#555; font-family:monospace; font-size:0.7rem;">— OK</span>';
    return `<div style="display:grid; grid-template-columns:1fr 60px 60px 60px 80px 100px; gap:8px; padding:12px; border-radius:6px; margin-bottom:6px; background:${o.overloaded ? '#2e1a1a' : '#1a1a1a'}; border:1px solid ${o.overloaded ? '#c0392b44' : '#2a2a2a'};">
      <div><div style="font-size:0.88rem; color:#ddd; margin-bottom:4px;">${o.owner !== 'Unassigned' ? '👤 ' : ''}${o.owner}</div>
      <div style="background:#111; border-radius:2px; height:3px;"><div style="background:${barColor}; width:${o.completion}%; height:3px; border-radius:2px;"></div></div></div>
      <span style="text-align:center; font-family:monospace; font-size:0.85rem; color:#888; padding-top:2px;">${o.total}</span>
      <span style="text-align:center; font-family:monospace; font-size:0.85rem; color:#c0392b; padding-top:2px;">${o.open}</span>
      <span style="text-align:center; font-family:monospace; font-size:0.85rem; color:#5a9a5a; padding-top:2px;">${o.done}</span>
      <span style="text-align:center; font-family:monospace; font-size:0.85rem; color:#aaa; padding-top:2px;">${o.completion}%</span>
      <span style="text-align:center; padding-top:2px;">${status}</span></div>`;
  }).join('');
  list.innerHTML = html;
}

let mediaRecorder = null, audioChunks = [], isRecording = false;

async function toggleRecording() {
  const btn = document.getElementById('record-btn');
  const status = document.getElementById('record-status');
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        status.textContent = 'Transcribing...';
        const blob = new Blob(audioChunks, {type: 'audio/webm'});
        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');
        try {
          const res = await fetch('/transcribe', {method: 'POST', body: formData});
          const data = await res.json();
          if (data.text) {
            document.getElementById('notes').value = data.text;
            status.textContent = 'Transcription complete. Review and click Clean Notes.';
            status.style.color = '#5a9a5a';
          } else {
            status.textContent = 'Error: ' + (data.error || 'Unknown error');
            status.style.color = '#c0392b';
          }
        } catch(e) { status.textContent = 'Failed: ' + e.message; status.style.color = '#c0392b'; }
        stream.getTracks().forEach(t => t.stop());
        btn.textContent = '\u25CF Record';
        btn.style.borderColor = btn.style.color = '';
        isRecording = false;
      };
      mediaRecorder.start();
      isRecording = true;
      btn.textContent = '\u25A0 Stop Recording';
      btn.style.borderColor = btn.style.color = '#c0392b';
      status.style.display = 'block';
      status.style.color = '#555';
      status.textContent = 'Recording... click Stop when done.';
    } catch(e) {
      status.style.display = 'block';
      status.textContent = 'Microphone access denied: ' + e.message;
      status.style.color = '#c0392b';
    }
  } else { mediaRecorder.stop(); }
}

function exportMarkdown() {
  var title = document.getElementById('title').value.trim() || 'Meeting Notes';
  var now = new Date().toLocaleString();
  var NL = '\n';
  var high   = currentPoints.filter(function(p) { return p.priority === 'high'; });
  var medium = currentPoints.filter(function(p) { return p.priority === 'medium'; });
  var low    = currentPoints.filter(function(p) { return p.priority === 'low'; });
  function section(label, items) {
    if (!items.length) return '';
    return '## ' + label + NL + items.map(function(p) {
      return '- [ ] ' + p.text + ' (Owner: ' + p.owner + ')';
    }).join(NL) + NL + NL;
  }
  var md = '# ' + title + NL + '*Exported: ' + now + '*' + NL + NL
    + section('HIGH Priority', high)
    + section('MEDIUM Priority', medium)
    + section('LOW Priority', low);
  var blob = new Blob([md], {type: 'text/markdown'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = title.replace(/\s+/g, '_') + '_notes.md';
  a.click();
  URL.revokeObjectURL(url);
}

function exportPDF() {
  var title = document.getElementById('title').value.trim() || 'Meeting Notes';
  var now = new Date().toLocaleString();
  var colors = {high: '#c0392b', medium: '#8a9a2a', low: '#2a6a8a'};
  var labels = {high: 'HIGH', medium: 'MEDIUM', low: 'LOW'};
  var items = currentPoints.map(function(p) {
    return '<div style="padding:10px 14px;margin-bottom:8px;border-left:3px solid ' + colors[p.priority] + ';background:#f9f9f9;border-radius:4px;">'
      + '<span style="font-size:11px;font-weight:bold;color:' + colors[p.priority] + '">' + labels[p.priority] + '</span>'
      + '<p style="margin:4px 0;font-size:13px;">' + p.text + '</p>'
      + '<span style="font-size:11px;color:#888;">Owner: ' + p.owner + '</span></div>';
  }).join('');
  var html = '<html><head><title>' + title + '</title>'
    + '<style>body{font-family:Georgia,serif;padding:40px;max-width:800px;margin:0 auto}'
    + 'h1{font-size:22px;margin-bottom:4px}.meta{color:#888;font-size:12px;margin-bottom:24px}</style></head>'
    + '<body><h1>' + title + '</h1><div class="meta">Exported: ' + now + '</div>' + items + '</body></html>';
  var win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.print();
}

document.getElementById('notes').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) processNotes();
});
</script>
</body>
</html>

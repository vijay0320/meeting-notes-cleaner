<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetingMind — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #161616;
  --border: #1e1e1e;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --accent: #e8ff47;
  --accent2: #ff4757;
  --card: #111111;
  --input-bg: #0a0a0a;
}
[data-theme="light"] {
  --bg: #f5f5f0;
  --bg2: #efefea;
  --bg3: #e8e8e3;
  --border: #ddddd8;
  --text: #0a0a0a;
  --text2: #555;
  --text3: #aaa;
  --accent: #1a1a1a;
  --accent2: #c0392b;
  --card: #ffffff;
  --input-bg: #f8f8f4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  transition: background 0.4s, color 0.4s;
}

/* ── ANIMATED BACKGROUND ── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.5;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(48px); }
}
.bg-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: glowFloat 8s ease-in-out infinite;
}
.bg-glow-1 {
  width: 400px; height: 400px;
  background: rgba(232,255,71,0.06);
  top: -100px; right: -100px;
}
.bg-glow-2 {
  width: 300px; height: 300px;
  background: rgba(71,200,255,0.04);
  bottom: -80px; left: -80px;
  animation-delay: -4s;
}
@keyframes glowFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(20px, -20px) scale(1.1); }
}
.bg-particles {
  position: absolute; inset: 0;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px;
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
  text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
.theme-toggle {
  width: 36px; height: 20px;
  background: var(--border);
  border-radius: 10px;
  border: none; cursor: pointer;
  position: relative;
  display: flex; align-items: center; padding: 2px;
  transition: background 0.3s;
}
.theme-toggle::after {
  content: '';
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--text);
  transition: transform 0.3s;
}
[data-theme="light"] .theme-toggle::after { transform: translateX(16px); }

/* ── FORM CARD ── */
.form-container {
  position: relative; z-index: 10;
  width: 100%; max-width: 420px;
  padding: 20px;
  opacity: 0;
}
.form-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
  backdrop-filter: blur(20px);
}
.form-eyebrow {
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.form-eyebrow::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--text3);
}
.form-title {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 8px;
}
.form-title em {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.form-subtitle {
  font-size: 0.78rem;
  color: var(--text2);
  margin-bottom: 36px;
  line-height: 1.6;
}
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
}
.form-input::placeholder { color: var(--text3); }
.form-input-wrapper { position: relative; }
.form-input-icon {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); font-size: 0.8rem;
  cursor: pointer; user-select: none;
  transition: color 0.2s;
}
.form-input-icon:hover { color: var(--text2); }
.form-error {
  font-size: 0.7rem;
  color: var(--accent2);
  margin-top: 6px;
  display: none;
}
.form-error.show { display: block; }
.btn-submit {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}
.btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-submit:active { transform: translateY(0); }
.btn-submit.loading { opacity: 0.7; cursor: not-allowed; }
.btn-submit-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
.spinner-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--bg);
  display: none;
  animation: spinDot 0.6s ease-in-out infinite alternate;
}
.spinner-dot:nth-child(2) { animation-delay: 0.2s; }
.spinner-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes spinDot { from { opacity: 0.3; } to { opacity: 1; } }
.loading .spinner-dot { display: block; }
.loading .btn-text { display: none; }
.form-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0;
}
.form-divider::before, .form-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.form-divider span { font-size: 0.7rem; color: var(--text3); white-space: nowrap; }
.form-footer {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text2);
  margin-top: 24px;
}
.form-footer a {
  color: var(--accent);
  text-decoration: none;
  transition: opacity 0.2s;
}
.form-footer a:hover { opacity: 0.8; }
.form-alert {
  padding: 12px 14px;
  border-radius: 6px;
  font-size: 0.75rem;
  margin-bottom: 20px;
  display: none;
}
.form-alert.error { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.2); color: #ff4757; }
.form-alert.success { background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); color: var(--accent); }
.form-alert.show { display: block; }

/* ── CURSOR ── */
.cursor {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s;
  mix-blend-mode: difference;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-particles" id="particles"></div>
</div>

<nav>
  <a href="landing.html" class="nav-logo">
    <span class="logo-dot"></span>
    MeetingMind
  </a>
  <button class="theme-toggle" onclick="toggleTheme()"></button>
</nav>

<div class="form-container" id="form-container">
  <div class="form-card">
    <div class="form-eyebrow">Welcome back</div>
    <h1 class="form-title">Sign <em>in</em></h1>
    <p class="form-subtitle">Access your team's meeting intelligence dashboard.</p>

    <div class="form-alert" id="alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-input" id="email" placeholder="you@company.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="form-input-wrapper">
          <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:44px">
          <span class="form-input-icon" onclick="togglePassword()" id="eye-icon">show</span>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <div class="btn-submit-inner">
          <span class="btn-text">Sign in →</span>
          <span class="spinner-dot"></span>
          <span class="spinner-dot"></span>
          <span class="spinner-dot"></span>
        </div>
      </button>
    </form>

    <div class="form-divider"><span>or</span></div>

    <div class="form-footer">
      Don't have an account? <a href="register.html">Create one →</a>
    </div>
  </div>
</div>

<script>
// ── CURSOR ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX - 4 + 'px';
  cursor.style.top = e.clientY - 4 + 'px';
});
document.querySelectorAll('a, button, input').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(3)');
  el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
});

// ── THEME ──
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// ── PARTICLES ──
const container = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.setProperty('--drift', (Math.random() - 0.5) * 100 + 'px');
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = -(Math.random() * 20) + 's';
  container.appendChild(p);
}

// ── ENTRANCE ANIMATION ──
anime({
  targets: '#form-container',
  opacity: [0, 1],
  translateY: [30, 0],
  duration: 800,
  easing: 'easeOutExpo',
  delay: 200
});

// ── PASSWORD TOGGLE ──
function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = 'hide';
  } else {
    input.type = 'password';
    icon.textContent = 'show';
  }
}

// ── SHOW ALERT ──
function showAlert(msg, type) {
  const alert = document.getElementById('alert');
  alert.textContent = msg;
  alert.className = 'form-alert show ' + type;
}

// ── LOGIN HANDLER ──
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btn.classList.add('loading');

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();

    if (!res.ok) {
      showAlert(data.detail || 'Invalid email or password.', 'error');
      anime({ targets: '#form-container', translateX: [-8, 8, -6, 6, 0], duration: 400, easing: 'easeInOutSine' });
    } else {
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', data.role);
      showAlert('Welcome back! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = data.role === 'manager' ? '/dashboard' : '/tasks';
      }, 800);
    }
  } catch(err) {
    showAlert('Connection error. Is the server running?', 'error');
  } finally {
    btn.classList.remove('loading');
  }
}
</script>
</body>
</html>
